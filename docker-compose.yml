services:
  backend:
    build:
      context: ./backend
    container_name: magic-eraser-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: magic-eraser-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
