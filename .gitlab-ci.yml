stages:
  - test
  - build

default:
  interruptible: true

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

backend:syntax-check:
  stage: test
  image: python:3.12-slim
  rules:
    - changes:
        - backend/**/*
        - .gitlab-ci.yml
    - when: never
  before_script:
    - python --version
    - pip install --no-cache-dir fastapi uvicorn sqlalchemy python-dotenv psycopg2-binary python-multipart
  script:
    - python -m compileall -q backend

frontend:build:
  stage: build
  image: node:20
  rules:
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    when: on_success
    expire_in: 1 week
    paths:
      - frontend/dist/
